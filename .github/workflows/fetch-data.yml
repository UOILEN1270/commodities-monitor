name: Fetch Commodities Data

on:
  schedule:
    - cron: '0 1,9,21 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/fetch_data.py'
      - '.github/workflows/fetch-data.yml'
      - 'index.html'

permissions:
  contents: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests yfinance akshare

      - name: Fetch data
        run: python scripts/fetch_data.py

      - name: Commit and push data
        run: |
          git config user.name "commodities-monitor-bot"
          git config user.email "bot@commodities-monitor"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes"
          else
            git commit -m "auto: update commodities data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: '.'
          publish_branch: gh-pages
          exclude_assets: '.github,.gitignore,scripts'
